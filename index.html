<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Vendas ZUCCA</title>

  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Sistema de Vendas ZUCCA 💰</h1>

<div class="tabs">
  <button onclick="mostrarAba('vendas')">Vendas</button>
  <button onclick="mostrarAba('clientes')">Clientes</button>
</div>

<div id="aba-vendas">

<section>
  <h2>Cadastro de Produto</h2>
  <input id="nomeProduto" placeholder="Nome">
  <input id="valorProduto" type="number" placeholder="Custo">
  <input id="quantidadeProduto" type="number" placeholder="Estoque">
  <button onclick="cadastrarProduto()">Cadastrar</button>
</section>

<section>
  <h2>Produtos</h2>
  <div id="listaProdutos"></div>
</section>

<section>
  <h2>Nova Venda</h2>
  <input id="nomeCliente" placeholder="Cliente">
  <input id="telefoneCliente" placeholder="Telefone">

  <select id="formaPagamento">
    <option>Dinheiro</option>
    <option>Cartão</option>
    <option>Pix</option>
  </select>

  <select id="produtoVenda"></select>
  <input id="descontoVenda" placeholder="% desconto">

  <div id="previewPreco"></div>

  <button onclick="registrarVenda()">Registrar Venda</button>
</section>

<section>
  <h2>Meta de Vendas 🎯</h2>
  <input id="metaValor" type="number" placeholder="Definir meta (R$)">
  <button onclick="salvarMeta()">Salvar Meta</button>
</section>

<section>
  <h2>Dashboard</h2>
  <div id="dashboard"></div>
</section>

<section>
  <h2>Vendas</h2>
  <div id="listaVendas"></div>
</section>

</div>

<div id="aba-clientes" style="display:none;">
  <h2>Banco de Clientes</h2>
  <div id="listaClientes"></div>
</div>

<script src="script.js"></script>
</body>
</html>
